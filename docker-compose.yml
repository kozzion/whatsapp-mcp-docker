services:
  whatsapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: whatsapp-mcp:latest
    container_name: whatsapp-mcp
    ports:
      # Login control API (used by the QR page) — localhost only.
      - "127.0.0.1:8080:8080"
      # MCP streamable-http endpoint — localhost only (no auth). Host 8001.
      - "127.0.0.1:8001:8000"
    volumes:
      # WhatsApp session + message history + media live on the host at the
      # path from .env (PATH_DIR_DATA_WHATSAPPMCP), bind-mounted into the store.
      - type: bind
        source: ${PATH_DIR_DATA_WHATSAPPMCP:?set PATH_DIR_DATA_WHATSAPPMCP in .env}
        target: /app/whatsapp-mcp-server/store
    restart: unless-stopped
